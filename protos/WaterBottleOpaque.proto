#VRML_SIM R2025a utf8
# license: MIT
# A drop-in replacement for Cyberbotics' WaterBottle that uses opaque PBR
# geometry and therefore renders correctly into Webots' shadow map. The
# upstream PROTO uses a textured IndexedFaceSet whose appearance pipeline
# (texture-driven alpha, possibly transmission-like roughness) makes the
# shadow renderer skip it; the simple Cylinder + opaque PBR here doesn't
# have that problem.
#
# Same interface as WaterBottle (translation, rotation, name, mass) so the
# world file only needs to change the type name.

PROTO WaterBottleOpaque [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFString   name        "water bottle"
  field SFColor    color       0.10 0.55 0.85
  field SFFloat    mass        0.5
  field SFFloat    radius      0.034
  field SFFloat    height      0.22
]
{
  Solid {
    translation IS translation
    rotation    IS rotation
    children [
      Pose {
        # Webots R2025a's Cylinder geometry already aligns its central axis
        # with the world up direction in ENU mode, so no rotation is needed —
        # only a translation by height/2 to put the bottle's base at the
        # parent (Solid) origin (matches WaterBottle's bottom-centred
        # convention so the world file's translation lands the base on the
        # table top).
        translation 0 0 %<= fields.height.value * 0.5 >%
        children [
          Shape {
            castShadows TRUE
            appearance PBRAppearance {
              baseColor    IS color
              metalness    0.0
              roughness    0.3
              transparency 0.0
            }
            geometry Cylinder {
              height IS height
              radius IS radius
            }
          }
        ]
      }
    ]
    name  IS name
    model "water bottle"
    # Bounding object kept as an upright Box rather than a rotated Cylinder
    # because Webots can't reliably apply a Pose rotation to a Cylinder used
    # as a collision shape — the inertia tensor ends up computed about the
    # un-rotated local axes and the bottle tips over on contact. A Box's
    # size axes are independent so no rotation is needed.
    boundingObject Pose {
      translation 0 0 %<= fields.height.value * 0.5 >%
      children [
        Box {
          size %<= 2.0 * fields.radius.value >% %<= 2.0 * fields.radius.value >% %<= fields.height.value >%
        }
      ]
    }
    %< if (fields.mass.value > 0) { >%
      physics Physics {
        density -1
        mass IS mass
      }
    %< } >%
  }
}
